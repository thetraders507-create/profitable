<!DOCTYPE html>
<html>
<head>
    <title>MarketDuniyaa | Pro Signal Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        header {
            background: #111827;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid #1f2937;
        }

        .container {
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin-top: 0;
            font-size: 18px;
            color: #94a3b8;
        }

        .price {
            font-size: 24px;
            margin: 10px 0;
        }

        .signal-box {
            text-align: center;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: bold;
        }

        .buy {
            background: #064e3b;
            color: #10b981;
        }

        .sell {
            background: #4c0519;
            color: #f43f5e;
        }

        .neutral {
            background: #1e293b;
            color: #facc15;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #1f2937;
        }
    </style>
</head>

<body>

<header>
    📊 MarketDuniyaa Pro Signal Dashboard
</header>

<div class="container">

    <div id="signalBox" class="signal-box neutral">
        Calculating Signal...
    </div>

    <div class="grid">
        <div class="card">
            <h3>NIFTY 50</h3>
            <div id="niftyPrice" class="price">Loading...</div>
        </div>

        <div class="card">
            <h3>BANK NIFTY</h3>
            <div id="bankNiftyPrice" class="price">Loading...</div>
        </div>

        <div class="card">
            <h3>Gold</h3>
            <div id="goldPrice" class="price">Loading...</div>
        </div>

        <div class="card">
            <h3>Bitcoin</h3>
            <div id="btcPrice" class="price">Loading...</div>
        </div>
    </div>

</div>

<footer>
    ⚠ This platform is for educational purposes only. We are not SEBI registered advisors.
</footer>

<script>

function calculateEMA(prices, period) {
    let k = 2 / (period + 1);
    let ema = prices[0];
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

// Demo Nifty Data (Replace with real API later)
let prices = [22000,22100,22200,22300,22400,22500,22600,22700,22800,22900];

let ema9 = calculateEMA(prices, 9);
let ema15 = calculateEMA(prices, 15);
let lastPrice = prices[prices.length - 1];

let signalBox = document.getElementById("signalBox");

if (lastPrice > ema9 && ema9 > ema15) {
    signalBox.innerHTML = "🚀 BUY SIGNAL";
    signalBox.className = "signal-box buy";
} 
else if (lastPrice < ema9 && ema9 < ema15) {
    signalBox.innerHTML = "🔻 SELL SIGNAL";
    signalBox.className = "signal-box sell";
} 
else {
    signalBox.innerHTML = "⚠ NO CLEAR SIGNAL";
    signalBox.className = "signal-box neutral";
}

document.getElementById("niftyPrice").innerHTML = "₹ " + lastPrice;
document.getElementById("bankNiftyPrice").innerHTML = "₹ 48,200 (Demo)";
document.getElementById("goldPrice").innerHTML = "₹ 62,000 (Demo)";

// Live Bitcoin API
fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=inr")
.then(res => res.json())
.then(data => {
    document.getElementById("btcPrice").innerHTML = "₹ " + data.bitcoin.inr;
});

setInterval(() => location.reload(), 30000);

</script>

</body>
</html>
